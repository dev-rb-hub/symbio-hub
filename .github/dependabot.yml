version: 2
updates:
  # 1. Scan React Frontend Packages
  - package-ecosystem: "npm"
    directory: "/frontend/Symbio.Frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # 2. Scan .NET Backend NuGet Packages
  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # 3. Scan GitHub Actions Workflow Versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci-cd"
